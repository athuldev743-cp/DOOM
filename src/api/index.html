<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>DOOM AI</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DOOM" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    :root {
      --red: #ff3333;
      --red-dim: #ff333322;
      --red-border: #ff333344;
      --bg: #080808;
      --bg2: #0f0f0f;
      --bg3: #161616;
      --border: #1e1e1e;
      --text: #e8e8e8;
      --text-dim: #555;
      --text-mid: #888;
    }

    html, body {
      height: 100%;
      height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
    }

    /* ── LAYOUT ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: var(--red);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: white;
      letter-spacing: 1px;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--text);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse-dot 2s infinite;
    }

    .status-dot.thinking {
      background: #f59e0b;
      animation: pulse-dot 0.5s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .header-actions {
      display: flex;
      gap: 6px;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--text-dim);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
    }

    .icon-btn:hover, .icon-btn.active {
      border-color: var(--red-border);
      color: var(--red);
      background: var(--red-dim);
    }

    /* ── MESSAGES ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 0; }

    .msg-row {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.25s ease forwards;
    }

    .msg-row.user { flex-direction: row-reverse; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .avatar.doom {
      background: var(--red);
      color: white;
    }

    .avatar.user {
      background: #1e3a5f;
      color: #60a5fa;
    }

    .bubble {
      max-width: calc(100% - 50px);
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.doom {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }

    .bubble.user {
      background: #1e3a5f;
      border: 1px solid #2a4a7f;
      border-top-right-radius: 4px;
      color: #e0eeff;
    }

    .thinking-dots span {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--red);
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }

    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    /* ── VOICE BANNER ── */
    .voice-banner {
      display: none;
      padding: 8px 18px;
      background: var(--red-dim);
      border-top: 1px solid var(--red-border);
      font-size: 12px;
      color: var(--red);
      text-align: center;
      font-family: 'DM Mono', monospace;
      flex-shrink: 0;
      letter-spacing: 0.1em;
    }

    .voice-banner.active { display: block; }

    /* ── INPUT AREA ── */
    .input-area {
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    .mic-btn {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--text-dim);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .mic-btn.listening {
      border-color: var(--red);
      background: var(--red-dim);
      color: var(--red);
      animation: pulse-ring 1s infinite;
    }

    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 0 0 #ff333333; }
      50% { box-shadow: 0 0 0 6px #ff333300; }
    }

    #input {
      flex: 1;
      height: 42px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 16px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Space Grotesk', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    #input:focus { border-color: var(--red-border); }
    #input::placeholder { color: var(--text-dim); }

    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: none;
      background: var(--red);
      color: white;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .send-btn:active { transform: scale(0.93); }
    .send-btn:disabled { background: var(--bg3); color: var(--text-dim); }

    /* ── MEMORY PANEL ── */
    .memory-panel {
      display: none;
      position: fixed;
      inset: 0;
      background: #000000cc;
      z-index: 100;
      align-items: flex-end;
    }

    .memory-panel.open { display: flex; }

    .memory-sheet {
      background: var(--bg2);
      border-radius: 20px 20px 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
      width: 100%;
      max-height: 75vh;
      overflow-y: auto;
      padding: 20px;
      animation: slideUp 0.25s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .memory-sheet::-webkit-scrollbar { width: 0; }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .sheet-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--red);
      letter-spacing: 0.15em;
      margin-bottom: 16px;
      font-family: 'DM Mono', monospace;
    }

    .memory-item {
      padding: 10px 12px;
      background: var(--bg3);
      border-radius: 8px;
      margin-bottom: 6px;
      border: 1px solid var(--border);
    }

    .memory-key {
      font-size: 10px;
      color: var(--red);
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.1em;
      margin-bottom: 3px;
    }

    .memory-val {
      font-size: 13px;
      color: var(--text);
    }

    .section-label {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.2em;
      margin: 14px 0 8px;
      font-family: 'DM Mono', monospace;
    }

    /* ── UPLOAD ── */
    .upload-bar {
      padding: 8px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    .upload-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-dim);
      cursor: pointer;
      padding: 5px 10px;
      border: 1px dashed var(--border);
      border-radius: 6px;
      transition: all 0.15s;
      font-family: 'DM Mono', monospace;
    }

    .upload-label:hover {
      border-color: var(--red-border);
      color: var(--red);
    }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="logo">D</div>
      <div class="header-info">
        <h1>DOOM</h1>
        <div class="status">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">online</span>
        </div>
      </div>
    </div>
    <div class="header-actions">
      <div class="icon-btn" id="speak-btn" onclick="toggleSpeak()" title="Toggle voice">🔊</div>
      <div class="icon-btn" onclick="getBriefing()" title="Daily Briefing">☀️</div>
      <div class="icon-btn" onclick="toggleMemory()" title="Memory">🧠</div>
      <div class="icon-btn" onclick="clearChat()" title="Clear">🗑</div>
    </div>
  </div>

  <!-- UPLOAD BAR -->
  <div class="upload-bar">
    <label class="upload-label">
      📎 upload document
      <input type="file" id="file-upload" accept=".pdf,.txt,.md" style="display:none" onchange="uploadDoc(this)" />
    </label>
  </div>

  <!-- MESSAGES -->
  <div id="messages">
    <div class="msg-row">
      <div class="avatar doom">D</div>
      <div class="bubble doom">Hey Athul! DOOM online and ready 🔥<br/>Voice, search, reminders, calls — just ask.</div>
    </div>
  </div>

  <!-- VOICE BANNER -->
  <div class="voice-banner" id="voice-banner">🎤 listening... speak now</div>

  <!-- INPUT -->
  <div class="input-area">
    <button class="mic-btn" id="mic">🎤</button>
    <input id="input" type="text" placeholder="Message DOOM..." autocomplete="off" />
    <button class="send-btn" id="send">➤</button>
  </div>

</div>


<!-- MEMORY PANEL -->
<div class="memory-panel" id="memory-panel" onclick="closeMemory(event)">
  <div class="memory-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">🧠 DOOM MEMORY</div>
    <div id="memory-content"></div>
  </div>
</div>

<script>
 const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const micBtn = document.getElementById('mic');
const voiceBanner = document.getElementById('voice-banner');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const speakBtn = document.getElementById('speak-btn');

window._speakOutput = true;
speakBtn.classList.add('active');
speakBtn.textContent = '🔊';

let audioQueue = [];
let isPlaying = false;
let currentAudio = null;

function toggleSpeak() {
  window._speakOutput = !window._speakOutput;
  speakBtn.classList.toggle('active', window._speakOutput);
  speakBtn.textContent = window._speakOutput ? '🔊' : '🔇';
  if (!window._speakOutput) {
    audioQueue = [];
    isPlaying = false;
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  }
}

function processQueue() {
  if (!window._speakOutput || audioQueue.length === 0) {
    isPlaying = false;
    currentAudio = null;
    return;
  }
  isPlaying = true;
  const audio = audioQueue.shift();
  currentAudio = audio;
  audio.onended = () => { currentAudio = null; processQueue(); };
  audio.onerror = () => { currentAudio = null; processQueue(); };
  audio.play().catch(() => processQueue());
}

function speak(text) {
  if (!window._speakOutput || !text || !text.trim()) return;
  
  // Split into sentences — play first one immediately, queue rest
  const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
  
  sentences.forEach((sentence, i) => {
    const clean = sentence.trim();
    if (!clean) return;
    fetch('/speak', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: clean })
    })
    .then(r => r.blob())
    .then(blob => {
      const audio = new Audio(URL.createObjectURL(blob));
      audioQueue.push(audio);
      if (!isPlaying) processQueue();
    })
    .catch(e => console.log('TTS:', e));
  });
}

function setStatus(state) {
  if (state === 'thinking') {
    statusDot.className = 'status-dot thinking';
    statusText.textContent = 'thinking...';
  } else {
    statusDot.className = 'status-dot';
    statusText.textContent = 'online';
  }
}

function addMessage(role, html) {
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'doom' ? 'D' : 'A';
  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.innerHTML = html;
  row.appendChild(avatar);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bubble;
}

function handleSpecialResponse(response) {

  if (response.includes('CALL:')) {
    const match = response.match(/CALL:(\+?\d+):(.+)/);

    if (match) {
      if (confirm(`📞 Call ${match[2]}?`)) {
        window.location.href = `tel:${match[1]}`;
      }

      return `📞 Calling ${match[2]}...`;
    }
  }

  if (response.includes('WHATSAPP:')) {
    const match = response.match(/WHATSAPP:(\d+):([\s\S]*)/);

    if (match) {
      const number = match[1];
      const message = match[2] || '';

      const waApp = `whatsapp://send?phone=${number}&text=${encodeURIComponent(message)}`;
      const waWeb = `https://wa.me/${number}?text=${encodeURIComponent(message)}`;

      // Try native WhatsApp app first
      const link = document.createElement('a');
      link.href = waApp;
      link.style.display = 'none';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      // Fallback to web after 1.5s
      setTimeout(() => {
        window.open(waWeb, '_blank');
      }, 1500);

      return `💬 Opening WhatsApp...`;
    }
  }

  if (response.includes('WA_NOT_FOUND:')) {
    const match = response.match(/WA_NOT_FOUND:(.+)/);
    const name = match ? match[1] : 'contact';

    return `❌ Contact "${name}" not found. Try: "add contact ${name} +91XXXXXXXXXX"`;
  }

  if (response.includes('CALL_NOT_FOUND:')) {
    const match = response.match(/CALL_NOT_FOUND:(.+)/);
    const name = match ? match[1] : 'contact';

    return `❌ Contact "${name}" not found. Try: "add contact ${name} +91XXXXXXXXXX"`;
  }

  if (response.includes('LINKEDIN_AUTH_REQUIRED')) {
    window.open('/linkedin/auth', '_blank');
    return '🔗 Opening LinkedIn login... Come back after connecting!';
  }

  return response;
}

async function sendMessage(text) {
  text = text || inputEl.value.trim();
  if (!text) return;

  // Stop any current audio immediately
  audioQueue = [];
  isPlaying = false;
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }

  inputEl.value = '';
  sendBtn.disabled = true;
  setStatus('thinking');

  addMessage('user', text);
  const thinking = addMessage('doom', '<div class="thinking-dots"><span></span><span></span><span></span></div>');

  try {
    const res = await fetch('/chat-stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value);
      const lines = chunk.split('\n');

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));

          if (data.type === 'text') {
            const display = handleSpecialResponse(data.content);
            thinking.innerHTML = display;
          }

          if (data.type === 'audio' && window._speakOutput) {
            const audio = new Audio(data.url + '?t=' + Date.now());
            audioQueue.push(audio);
            if (!isPlaying) processQueue();
          }

        } catch(e) {}
      }
    }

  } catch (e) {
    thinking.innerHTML = 'Connection error. Is server running?';
  }

  sendBtn.disabled = false;
  setStatus('online');
  inputEl.focus();
}

sendBtn.onclick = () => sendMessage();
inputEl.onkeydown = e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
};

document.addEventListener('click', function unlock() {
  new Audio().play().catch(() => {});
  document.removeEventListener('click', unlock);
}, { once: true });

// Voice input
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  let isListening = false;

  micBtn.onclick = () => {
  // Stop audio when mic pressed
  audioQueue = [];
  isPlaying = false;
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  
  if (isListening) { recognition.stop(); return; }
  isListening = true;
  micBtn.classList.add('listening');
  micBtn.textContent = '⏹';
  voiceBanner.classList.add('active');
  inputEl.placeholder = 'Listening...';
  recognition.start();
};

  recognition.onresult = e => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    inputEl.value = transcript;
    if (e.results[e.results.length - 1].isFinal) { stopListening(); sendMessage(transcript); }
  };

  recognition.onend = () => stopListening();
  recognition.onerror = () => stopListening();

  function stopListening() {
    isListening = false;
    micBtn.classList.remove('listening');
    micBtn.textContent = '🎤';
    voiceBanner.classList.remove('active');
    inputEl.placeholder = 'Message DOOM...';
    inputEl.value = '';
  }
} else { micBtn.style.display = 'none'; }

let memoryOpen = false;

async function toggleMemory() {
  memoryOpen = !memoryOpen;
  const panel = document.getElementById('memory-panel');
  panel.classList.toggle('open', memoryOpen);
  if (memoryOpen) {
    const res = await fetch('/memory');
    const data = await res.json();
    const content = document.getElementById('memory-content');
    let html = '<div class="section-label">PROFILE</div>';
    for (const [k, v] of Object.entries(data.profile)) {
      html += `<div class="memory-item">
        <div class="memory-key">${k}</div>
        <div class="memory-val">${v}</div>
      </div>`;
    }
    html += '<div class="section-label">CONTACTS</div>';
    html += `<div class="memory-item"><div class="memory-val" style="white-space:pre-wrap">${data.contacts}</div></div>`;
    content.innerHTML = html;
  }
}

function closeMemory(e) {
  if (e.target === document.getElementById('memory-panel')) {
    memoryOpen = false;
    document.getElementById('memory-panel').classList.remove('open');
  }
}

async function clearChat() {
  await fetch('/reset', { method: 'DELETE' });
  messagesEl.innerHTML = '';
  addMessage('doom', 'Session cleared. Fresh start. 🔥');
}

async function uploadDoc(input) {
  const file = input.files[0];
  if (!file) return;
  const formData = new FormData();
  formData.append('file', file);
  const thinking = addMessage('doom', `<div class="thinking-dots"><span></span><span></span><span></span></div> Indexing ${file.name}...`);
  const res = await fetch('/upload', { method: 'POST', body: formData });
  const data = await res.json();
  thinking.innerHTML = `${data.result} — ask me anything about it.`;
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(() => console.log('DOOM PWA ready'))
    .catch(e => console.log('SW:', e));
}

async function getBriefing() {
  // Show loading immediately
  const btn = document.querySelector('[title="Daily Briefing"]');
  if (btn) { btn.textContent = '⏳'; btn.style.pointerEvents = 'none'; }
  
  const thinking = addMessage('doom', '<div class="thinking-dots"><span></span><span></span><span></span></div>');
  
  try {
    const res = await fetch('/briefing');
    const data = await res.json();
    const formatted = data.briefing
      .replace(/\n\n/g, '<br/><br/>')
      .replace(/\n/g, '<br/>');
    thinking.innerHTML = formatted;
    speak(data.briefing);
  } catch(e) {
    thinking.innerHTML = 'Briefing error. Try again.';
  }

  if (btn) { btn.textContent = '☀️'; btn.style.pointerEvents = 'auto'; }
}
</script>

</body>
</html>
